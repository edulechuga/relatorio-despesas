<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro de Quilometragem</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="glass-container">
        <!-- Navegação -->
        <div class="nav-tabs">
            <a href="index.html" class="active"><i data-lucide="map-pin"></i> Viagem</a>
            <a href="recibos.html"><i data-lucide="receipt"></i> Inteligente</a>
            <a href="relatorio.html"><i data-lucide="bar-chart-3"></i> Fechamento</a>
        </div>

        <div class="header">
            <h1>Registro de Viagem</h1>
            <p>Registre sua quilometragem para ressarcimento.</p>
        </div>

        <form id="kmForm">
            <!-- Dados Obrigatórios -->
            <div class="section-title">Dados Básicos</div>
            
            <div class="form-group">
                <label for="data">Data do Trajeto</label>
                <input type="date" id="data" required>
            </div>
            
            <div class="form-group">
                <label for="clientes">Clientes Visitados</label>
                <input type="text" id="clientes" placeholder="Ex: Av. Paulista ou Locadora X" required>
            </div>

            <!-- Modo de Cálculo -->
            <div class="toggle-container">
                <label class="toggle-switch">
                    <input type="checkbox" id="modoCalculo">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="toggleText">Usar rotas do Google Maps</span>
            </div>

            <!-- Campos Manuais (Padrão) -->
            <div id="camposManuais" class="form-section active">
                <div class="form-group">
                    <label for="kmIda">KM de Ida</label>
                    <input type="number" id="kmIda" step="0.1" placeholder="Ex: 15.5" required>
                </div>
                
                <div class="form-group">
                    <label for="kmVolta">KM de Volta (Opcional)</label>
                    <input type="number" id="kmVolta" step="0.1" placeholder="Ex: 15.5">
                </div>
            </div>

            <!-- Campos Endereço (API Google Maps) -->
            <div id="camposEndereco" class="form-section">
                <div class="form-group">
                    <label for="endPartida">Partida</label>
                    <input type="text" id="endPartida" placeholder="Av. Paulista, 1000 - SP">
                </div>
                
                <div id="waypointsContainer"></div>

                <div style="margin-bottom: 20px; text-align: left;">
                    <button type="button" id="btnAddWaypoint" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px;">
                        <i data-lucide="plus" style="width: 14px; height: 14px;"></i> Nova Parada
                    </button>
                </div>

                <div class="form-group">
                    <label for="endDestino">Destino Final</label>
                    <input type="text" id="endDestino" placeholder="Rua Augusta, 500 - SP">
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 12px; margin-top: 16px;">
                    <input type="checkbox" id="idaVoltaMaps" style="width: 18px; height: 18px;">
                    <label for="idaVoltaMaps" style="margin: 0; cursor: pointer;">Somar retorno ao ponto de partida</label>
                </div>

                <div id="map" class="map-container">
                    Rota do Google Maps será desenhada aqui
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Registrar KM Executado</span>
                <div class="loader"></div>
            </button>
        </form>

        <div id="mensagem" class="message hidden"></div>
    </div>

    <!-- API KEY do Google Maps configurada -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC6IjX8NApVebNVKTWLEcLeGpUgAhE5I2w&libraries=places&callback=initMap"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
