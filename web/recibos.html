<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner de Recibos IA</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="glass-container">
        <!-- Navegação -->
        <div class="nav-tabs">
            <a href="index.html"><i data-lucide="map-pin"></i> Viagem</a>
            <a href="recibos.html" class="active"><i data-lucide="receipt"></i> Inteligente</a>
            <a href="relatorio.html"><i data-lucide="bar-chart-3"></i> Fechamento</a>
        </div>

        <div class="header">
            <h1>Leitor Mestre I.A</h1>
            <p>Fotografe o recibo e deixe nós organizarmos sua despesa e preencher a planilha.</p>
        </div>

        <form id="reciboForm">
            <div class="section-title">Categoria Financeira</div>
            
            <div class="form-group">
                <!-- Segmented Control substitui o select feio -->
                <div class="segmented-control glass-panel" style="margin-top: 10px;">
                    <input type="radio" id="pessoal" name="tipoDespesaGroup" value="PESSOAL">
                    <label for="pessoal">Pessoal</label>

                    <input type="radio" id="caju" name="tipoDespesaGroup" value="CAJU" checked>
                    <label for="caju">Caju</label>

                    <input type="radio" id="viagem" name="tipoDespesaGroup" value="VIAGEM">
                    <label for="viagem">Viagem</label>
                    <div class="slider"></div>
                </div>
                <!-- Select oculto para não quebrar o JS atual -->
                <select id="tipoDespesa" style="display:none;" required>
                    <option value="PESSOAL">PESSOAL</option>
                    <option value="CAJU" selected>CAJU</option>
                    <option value="VIAGEM">VIAGEM</option>
                </select>
            </div>

            <div class="section-title" style="margin-top: 25px;">Comprovante</div>
            
            <div class="file-upload-wrapper" id="dropZone">
                <input type="file" id="arquivoRecibo" accept="image/*,application/pdf" required>
                <div class="file-upload-texts" id="uploadTexts">
                    <i data-lucide="camera"></i>
                    <h3>Tocar para Câmera ou Arquivo</h3>
                    <p>PNG, JPG ou PDF</p>
                </div>
            </div>
            
            <div id="previewContainer">
                <img id="imagePreview" src="" alt="Preview do Recibo">
                <p id="fileName" style="margin-top: 8px; font-size: 13px; color: var(--text-muted);"></p>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Extrair Dados Mágicos</span>
                <div class="loader"></div>
            </button>
        </form>

        <div id="mensagem" class="message hidden">
            <!-- Mensagens de sucesso ou erro -->
        </div>

        <!-- Modal de Revisão dos Dados -->
        <div id="reviewModal" class="modal hidden">
            <div class="modal-content glass-panel" style="max-width: 600px;">
                <div class="modal-header">
                    <h2>📋 Revisar Dados Extraídos</h2>
                    <button id="closeModal" class="modal-close">&times;</button>
                </div>
                <form id="reviewForm">
                    <div class="review-grid">
                        <div class="form-group">
                            <label for="reviewData">Data</label>
                            <input type="text" id="reviewData" name="data" required>
                        </div>
                        <div class="form-group">
                            <label for="reviewValor">Valor Total (R$)</label>
                            <input type="text" id="reviewValor" name="valor_total" required>
                        </div>
                        <div class="form-group">
                            <label for="reviewCategoria">Categoria</label>
                            <select id="reviewCategoria" name="categoria" required>
                                <option value="">Selecione a categoria</option>
                                <option value="Alimentação">Alimentação</option>
                                <option value="Hospedagem">Hospedagem</option>
                                <option value="Transporte">Transporte</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="reviewDescricao">Descrição</label>
                            <select id="reviewDescricao" name="descricao" required>
                                <option value="">Selecione a descrição</option>
                                <option value="Alimentação">Alimentação</option>
                                <option value="KM">KM</option>
                                <option value="Gasolina">Gasolina</option>
                                <option value="Estacionamento">Estacionamento</option>
                                <option value="Pedágio">Pedágio</option>
                                <option value="Uber">Uber</option>
                                <option value="Brindes">Brindes</option>
                                <option value="Compras Escritório">Compras Escritório</option>
                                <option value="Evento">Evento</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label for="reviewItens">Itens Comprados</label>
                            <input type="text" id="reviewItens" name="itens_comprados" required>
                        </div>
                        <div class="form-group">
                            <label for="reviewRazao">Razão Social</label>
                            <input type="text" id="reviewRazao" name="razao_social" required>
                        </div>
                        <div class="form-group">
                            <label for="reviewLocal">Local</label>
                            <input type="text" id="reviewLocal" name="local" required>
                        </div>
                    </div>
                    <div class="modal-actions" style="margin-top: 8px;">
                        <button type="button" id="cancelReview" class="btn-secondary">Cancelar</button>
                        <button type="submit" class="btn-primary" id="confirmReview">Confirmar e Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Full-screen Loading Overlay for Saving -->
        <div id="savingOverlay" class="modal hidden" style="background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
            <div class="loader" style="display: block; width: 60px; height: 60px; border-width: 4px; border-top-color: var(--primary); margin-bottom: 24px;"></div>
            <h2 style="color: white; font-weight: 600; font-size: 1.5rem; text-align: center; margin: 0;">Salvando Despesa...</h2>
        </div>
    </div>

    <script src="app_recibos.js?v=3"></script>
    <script>
        lucide.createIcons();
        
        // Sincroniza o Segmented Control com o seu Select nativo oculto
        const radios = document.querySelectorAll('input[name="tipoDespesaGroup"]');
        const hiddenSelect = document.getElementById('tipoDespesa');
        
        // Recupera o último selecionado na memória do celular
        const savedTipo = localStorage.getItem('lastTipoDespesa');
        if (savedTipo) {
            hiddenSelect.value = savedTipo;
            const savedRadio = document.querySelector(`input[name="tipoDespesaGroup"][value="${savedTipo}"]`);
            if(savedRadio) savedRadio.checked = true;
        }

        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                hiddenSelect.value = e.target.value;
                localStorage.setItem('lastTipoDespesa', e.target.value);
            });
        });
    </script>
</body>
</html>
