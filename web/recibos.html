<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner de Recibos IA</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="glass-container">
        <!-- Navegação -->
        <div class="nav-tabs">
            <a href="index.html"><i data-lucide="map-pin"></i> Viagem</a>
            <a href="recibos.html" class="active"><i data-lucide="receipt"></i> Inteligente</a>
            <a href="relatorio.html"><i data-lucide="bar-chart-3"></i> Fechamento</a>
        </div>

        <div class="header">
            <h1>Leitor Mestre I.A</h1>
            <p>Fotografe o recibo e deixe nós organizarmos sua despesa e preencher a planilha.</p>
        </div>

        <form id="reciboForm">
            <div class="section-title">Categoria Financeira</div>
            
            <div class="form-group">
                <!-- Segmented Control substitui o select feio -->
                <div class="segmented-control glass-panel" style="margin-top: 10px;">
                    <input type="radio" id="pessoal" name="tipoDespesaGroup" value="PESSOAL">
                    <label for="pessoal">Pessoal</label>

                    <input type="radio" id="caju" name="tipoDespesaGroup" value="CAJU" checked>
                    <label for="caju">Caju</label>

                    <input type="radio" id="viagem" name="tipoDespesaGroup" value="VIAGEM">
                    <label for="viagem">Viagem</label>
                    <div class="slider"></div>
                </div>
                <!-- Select oculto para não quebrar o JS atual -->
                <select id="tipoDespesa" style="display:none;" required>
                    <option value="PESSOAL">PESSOAL</option>
                    <option value="CAJU" selected>CAJU</option>
                    <option value="VIAGEM">VIAGEM</option>
                </select>
            </div>

            <div class="section-title" style="margin-top: 25px;">Comprovante</div>
            
            <div class="file-upload-wrapper" id="dropZone">
                <input type="file" id="arquivoRecibo" accept="image/*,application/pdf" required>
                <div class="file-upload-texts" id="uploadTexts">
                    <i data-lucide="camera"></i>
                    <h3>Tocar para Câmera ou Arquivo</h3>
                    <p>PNG, JPG ou PDF</p>
                </div>
            </div>
            
            <div id="previewContainer">
                <img id="imagePreview" src="" alt="Preview do Recibo">
                <p id="fileName" style="margin-top: 8px; font-size: 13px; color: var(--text-muted);"></p>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Extrair Dados Mágicos</span>
                <div class="loader"></div>
            </button>
        </form>

        <div id="mensagem" class="message hidden">
            <!-- Mensagens de sucesso ou erro -->
        </div>
    </div>

    <script src="app_recibos.js"></script>
    <script>
        lucide.createIcons();
        
        // Sincroniza o Segmented Control com o seu Select nativo oculto
        const radios = document.querySelectorAll('input[name="tipoDespesaGroup"]');
        const hiddenSelect = document.getElementById('tipoDespesa');
        
        // Recupera o último selecionado na memória do celular
        const savedTipo = localStorage.getItem('lastTipoDespesa');
        if (savedTipo) {
            hiddenSelect.value = savedTipo;
            const savedRadio = document.querySelector(`input[name="tipoDespesaGroup"][value="${savedTipo}"]`);
            if(savedRadio) savedRadio.checked = true;
        }

        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                hiddenSelect.value = e.target.value;
                localStorage.setItem('lastTipoDespesa', e.target.value);
            });
        });
    </script>
</body>
</html>
