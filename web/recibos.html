<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Recibos IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .nav-tabs a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .nav-tabs a.active {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .file-upload-wrapper {
            position: relative;
            width: 100%;
            height: 150px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .file-upload-wrapper:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.2);
        }
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }
        .file-upload-texts {
            text-align: center;
            pointer-events: none;
            z-index: 1;
        }
        .file-upload-texts h3 {
            margin: 0;
            font-size: 16px;
            color: #fff;
        }
        .file-upload-texts p {
            margin: 5px 0 0;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        #previewContainer {
            margin-top: 15px;
            text-align: center;
            display: none;
        }
        #previewContainer img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <!-- Navegação -->
        <div class="nav-tabs">
            <a href="index.html">📍 Quilometragem</a>
            <a href="recibos.html" class="active">🧾 Recibos Inteligentes</a>
        </div>

        <div class="header">
            <h1>Leitor de Despesas</h1>
            <p>Tire uma foto do recibo para processar e salvar automaticamente.</p>
        </div>

        <form id="reciboForm">
            <div class="section-title">Categoria da Despesa</div>
            
            <div class="form-group">
                <label for="tipoDespesa">Onde este valor deve ser salvo? *</label>
                <select id="tipoDespesa" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.1); color: #fff; font-size: 16px; margin-top: 5px;">
                    <option value="" disabled selected>Selecione uma opção...</option>
                    <option value="PESSOAL">Despesa Pessoal</option>
                    <option value="CAJU">Despesa CAJU</option>
                    <option value="VIAGEM">Despesa de Viagem</option>
                </select>
            </div>

            <div class="section-title" style="margin-top: 25px;">Documento</div>
            
            <div class="file-upload-wrapper" id="dropZone">
                <!-- O capture="environment" sugere ao mobile abrir a câmera traseira nativamente -->
                <input type="file" id="arquivoRecibo" accept="image/*,application/pdf" capture="environment" required>
                <div class="file-upload-texts" id="uploadTexts">
                    <h3>📷 Tocar para Câmera / Arquivo</h3>
                    <p>Suba uma foto do recibo ou um PDF</p>
                </div>
            </div>
            
            <div id="previewContainer">
                <img id="imagePreview" src="" alt="Preview do Recibo">
                <p id="fileName" style="margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.8);"></p>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn" style="margin-top: 25px;">
                <span>Processar com IA</span>
                <div class="loader"></div>
            </button>
        </form>

        <div id="mensagem" class="message hidden">
            <!-- Mensagens de sucesso ou erro -->
        </div>
    </div>

    <script src="app_recibos.js"></script>
</body>
</html>
